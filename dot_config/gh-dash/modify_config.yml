#!/usr/bin/env python3
"""chezmoi modify_ script for gh-dash's config.yml.

Runs on native python3 (always present on macOS/Linux), so it never blocks
`chezmoi apply` on a fresh machine. The actual YAML merge needs pyyaml, which
native python3 doesn't ship — so we delegate the heavy lifting to `uv`, which
resolves an ephemeral env from the inline PEP 723 metadata below.

Behavior:
  * If `uv` is available: re-run this exact file via `uv run --script`, which
    provides pyyaml, and perform the LOCAL-WINS merge.
  * If `uv` is NOT available (e.g. very first bootstrap before uv installs):
    pass stdin through to stdout unchanged. Nothing is destroyed; the merge
    simply happens on the next `chezmoi apply` once uv exists.

chezmoi pipes the CURRENT contents of ~/.config/gh-dash/config.yml to stdin
(empty on a fresh machine); whatever we print to stdout becomes the new file.

Merge policy — LOCAL WINS:
  * Your hand-edits to the live config survive `chezmoi apply`.
  * The BASE below supplies defaults and any NEW keys / sections you don't
    have yet (list entries are merged by their `title`/`key`/`name`).
  * Caveat: because local wins, once you locally change a value that BASE also
    defines, future BASE changes to that same value won't propagate.
"""
# /// script
# requires-python = ">=3.11"
# dependencies = ["pyyaml"]
# ///
import os
import shutil
import subprocess
import sys

BASE = r"""
prSections:
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
        height: 0.6
        position: auto
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            labels:
                width: 22
                hidden: true
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
    prs:
        # ENHANCE companion: inspect a PR's checks / Actions runs in a rich TUI.
        - key: E
          command: gh enhance -R {{.RepoName}} {{.PrNumber}}
repoPaths: {}
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: ""
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
"""

# Keys that identify an entry inside a list of dicts, so lists get merged by
# identity (union) instead of being replaced wholesale.
IDENTITY_KEYS = ("title", "key", "name")


def _running_under_uv() -> bool:
    """True when we've been re-executed via `uv run --script` (pyyaml present)."""
    try:
        import yaml  # noqa: F401
        return True
    except ImportError:
        return False


def _reexec_with_uv(stdin_data: str) -> int:
    """Re-run this same file through uv, forwarding stdin/stdout."""
    uv = shutil.which("uv")
    proc = subprocess.run(
        [uv, "run", "--script", "--quiet", os.path.abspath(__file__)],
        input=stdin_data,
        text=True,
        capture_output=True,
    )
    sys.stdout.write(proc.stdout)
    sys.stderr.write(proc.stderr)
    return proc.returncode


def identity(item: object):
    if isinstance(item, dict):
        for k in IDENTITY_KEYS:
            if k in item:
                return (k, item[k])
    return None


def is_keyed_list(value: object) -> bool:
    return isinstance(value, list) and len(value) > 0 and all(identity(i) is not None for i in value)


def merge(base: object, local: object) -> object:
    """Deep-merge with local precedence."""
    if isinstance(base, dict) and isinstance(local, dict):
        out = dict(base)
        for k, lv in local.items():
            out[k] = merge(out[k], lv) if k in out else lv
        return out
    if is_keyed_list(base) and is_keyed_list(local):
        merged = {identity(i): i for i in base}
        order = [identity(i) for i in base]
        for i in local:
            ident = identity(i)
            if ident in merged:
                merged[ident] = merge(merged[ident], i)
            else:
                merged[ident] = i
                order.append(ident)
        return [merged[ident] for ident in order]
    # scalars / plain lists / type mismatch: local wins when present
    return local


def _do_merge(stdin_data: str) -> int:
    import yaml
    base = yaml.safe_load(BASE) or {}
    local = yaml.safe_load(stdin_data) or {}
    result = merge(base, local)
    yaml.safe_dump(result, sys.stdout, sort_keys=False, default_flow_style=False, allow_unicode=True)
    return 0


def main() -> int:
    stdin_data = sys.stdin.read()

    # Case 1: already inside uv's env (pyyaml importable) -> do the real merge.
    if _running_under_uv():
        return _do_merge(stdin_data)

    # Case 2: native python3, but uv exists -> re-exec through uv to get pyyaml.
    if shutil.which("uv"):
        return _reexec_with_uv(stdin_data)

    # Case 3: no uv at all (early bootstrap) -> pass through unchanged.
    # Nothing is destroyed; the merge runs on the next apply once uv exists.
    sys.stdout.write(stdin_data)
    return 0


if __name__ == "__main__":
    sys.exit(main())